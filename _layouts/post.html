---
layout: default
---

<article class="post-article">
  <p class="post-back"><a href="{{ '/posts/' | relative_url }}">← Back to posts</a></p>
  <h1 class="post-title">{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: "%B %d, %Y" }}</p>
  <div class="post-content">
    {{ content }}
  </div>
</article>
